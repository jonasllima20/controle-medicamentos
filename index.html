<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remédios 💊</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --arthur: #3B82F6;
  --arthur-light: #DBEAFE;
  --arthur-mid: #93C5FD;
  --alice: #EC4899;
  --alice-light: #FCE7F3;
  --alice-mid: #F9A8D4;
  --bg: #F0F4FF;
  --card: #FFFFFF;
  --text: #1E1B4B;
  --text-muted: #6B7280;
  --border: #E5E7EB;
  --green: #10B981;
  --green-light: #D1FAE5;
  --red: #EF4444;
  --red-light: #FEE2E2;
  --yellow: #F59E0B;
  --shadow: 0 4px 20px rgba(59,82,246,0.08);
  --shadow-hover: 0 8px 32px rgba(59,82,246,0.15);
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 24px 16px 48px;
  color: var(--text);
}

body::before {
  content: '';
  position: fixed;
  top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%);
  pointer-events: none;
}

.container { max-width: 860px; margin: 0 auto; }

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeDown 0.5s ease both;
}

.header h1 {
  font-family: 'Nunito', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--arthur) 30%, var(--alice));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.header p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-top: 4px;
}

/* ALERTA */
#alerta {
  margin-bottom: 20px;
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 0.9rem;
  font-weight: 600;
  line-height: 1.6;
  animation: fadeDown 0.5s 0.1s ease both;
}
.alerta-ok { background: var(--green-light); color: #065F46; border: 1.5px solid #6EE7B7; }
.alerta-warn { background: var(--red-light); color: #991B1B; border: 1.5px solid #FCA5A5; }

/* CARDS CRIANÇAS */
.criancas-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
  animation: fadeUp 0.5s 0.15s ease both;
}

@media(max-width:600px){ .criancas-grid { grid-template-columns: 1fr; } }

.crianca-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow);
  border: 2px solid transparent;
  transition: box-shadow 0.2s, border-color 0.2s;
}

.crianca-card:hover { box-shadow: var(--shadow-hover); }
.crianca-card.arthur { border-color: var(--arthur-mid); }
.crianca-card.alice  { border-color: var(--alice-mid); }

.crianca-nome {
  font-family: 'Nunito', sans-serif;
  font-size: 1.25rem;
  font-weight: 900;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.crianca-card.arthur .crianca-nome { color: var(--arthur); }
.crianca-card.alice  .crianca-nome { color: var(--alice); }

.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  font-weight: 900;
  color: white;
}

.crianca-card.arthur .avatar { background: var(--arthur); }
.crianca-card.alice  .avatar { background: var(--alice); }

.meds-list { display: flex; flex-direction: column; gap: 8px; }

.med-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-radius: 12px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  transition: all 0.2s;
}

.med-item.done-arthur {
  background: var(--arthur-light);
  border-color: var(--arthur-mid);
}
.med-item.done-alice {
  background: var(--alice-light);
  border-color: var(--alice-mid);
}

.med-nome {
  font-size: 0.9rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--text);
}

.med-icon { font-size: 1rem; }

.med-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: all 0.2s;
  flex-shrink: 0;
}

.med-btn:hover { transform: scale(1.1); }

.med-btn.done-arthur {
  background: var(--arthur);
  border-color: var(--arthur);
  color: white;
}
.med-btn.done-alice {
  background: var(--alice);
  border-color: var(--alice);
  color: white;
}

.med-hora {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-left: 6px;
  white-space: nowrap;
}

/* PROGRESS */
.progresso-wrap {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.prog-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}

.prog-bar-bg {
  height: 8px;
  border-radius: 99px;
  background: var(--border);
  overflow: hidden;
}

.prog-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.4s ease;
}

.crianca-card.arthur .prog-bar-fill { background: var(--arthur); }
.crianca-card.alice  .prog-bar-fill { background: var(--alice); }

/* SECTION */
.section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.5s 0.2s ease both;
}

.section-title {
  font-family: 'Nunito', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}

/* CALENDÁRIO */
.cal-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}

.cal-dow {
  text-align: center;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  padding: 4px 0;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.cal-day {
  aspect-ratio: 1;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  border: 2px solid var(--border);
  background: white;
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  min-height: 46px;
}

.cal-day:hover { transform: scale(1.05); box-shadow: var(--shadow); }

.cal-day.hoje {
  border-color: #818CF8;
  box-shadow: 0 0 0 3px rgba(129,140,248,0.2);
}

.cal-day .num {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text);
  z-index: 2;
  line-height: 1;
}

/* STATUS SPLIT */
.cal-day .split-bg {
  position: absolute; inset: 0;
  display: flex;
}
.cal-day .split-bg .lado { flex: 1; opacity: 0.7; }
.cal-day .split-bg .azul { background: var(--arthur); }
.cal-day .split-bg .rosa { background: var(--alice); }
.cal-day .full-bg {
  position: absolute; inset: 0;
  opacity: 0.65;
}
.cal-day.full-arthur .full-bg { background: var(--arthur); }
.cal-day.full-alice  .full-bg { background: var(--alice); }

.cal-day .obs-dot {
  position: absolute;
  bottom: 3px; right: 4px;
  font-size: 9px;
  z-index: 3;
}

/* LEGENDA */
.legenda {
  display: flex;
  gap: 16px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.leg-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.78rem; color: var(--text-muted);
}
.leg-cor {
  width: 14px; height: 14px; border-radius: 4px;
}

/* HISTÓRICO */
.hist-dia {
  margin-bottom: 14px;
}
.hist-data {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.hist-items {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.hist-pill {
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 0.78rem;
  font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.hist-pill.arthur { background: var(--arthur-light); color: var(--arthur); }
.hist-pill.alice  { background: var(--alice-light);  color: var(--alice); }

.btn-limpar {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
}
.btn-limpar:hover { background: var(--red-light); color: var(--red); border-color: #FCA5A5; }

/* GRAFICO */
.grafico-wrap { position: relative; height: 180px; }

/* MODAL OBS */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(30,27,75,0.35);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: white;
  border-radius: 20px;
  padding: 28px;
  width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: scaleIn 0.2s ease;
}
.modal-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: 1.05rem;
  margin-bottom: 14px;
}
.modal-box textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  resize: vertical;
  min-height: 90px;
  outline: none;
  color: var(--text);
}
.modal-box textarea:focus { border-color: #818CF8; }
.modal-btns {
  display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end;
}
.modal-btn {
  padding: 9px 20px;
  border-radius: 10px;
  border: none; cursor: pointer;
  font-weight: 700; font-size: 0.85rem;
  transition: all 0.15s;
}
.modal-btn.cancel { background: var(--bg); color: var(--text-muted); }
.modal-btn.save { background: #818CF8; color: white; }
.modal-btn.save:hover { background: #6366F1; }
.modal-btn.del { background: var(--red-light); color: var(--red); }

/* ANIMATIONS */
@keyframes fadeDown {
  from { opacity:0; transform: translateY(-16px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; } to { opacity:1; }
}
@keyframes scaleIn {
  from { transform: scale(0.92); opacity:0; }
  to   { transform: scale(1); opacity:1; }
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>💊 Controle de Remédios</h1>
    <p id="data-hoje"></p>
  </div>

  <div id="alerta"></div>

  <div class="criancas-grid">
    <!-- Arthur -->
    <div class="crianca-card arthur">
      <div class="crianca-nome">
        <div class="avatar">A</div> Arthur
      </div>
      <div class="meds-list" id="meds-Arthur"></div>
      <div class="progresso-wrap">
        <div class="prog-label">Progresso hoje</div>
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" id="prog-Arthur" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Alice -->
    <div class="crianca-card alice">
      <div class="crianca-nome">
        <div class="avatar">A</div> Alice
      </div>
      <div class="meds-list" id="meds-Alice"></div>
      <div class="progresso-wrap">
        <div class="prog-label">Progresso hoje</div>
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" id="prog-Alice" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CALENDÁRIO -->
  <div class="section">
    <div class="section-title">📅 <span id="titulo-mes"></span></div>
    <div class="cal-header">
      <div class="cal-dow">Dom</div><div class="cal-dow">Seg</div>
      <div class="cal-dow">Ter</div><div class="cal-dow">Qua</div>
      <div class="cal-dow">Qui</div><div class="cal-dow">Sex</div>
      <div class="cal-dow">Sáb</div>
    </div>
    <div class="cal-grid" id="calendario"></div>
    <div class="legenda">
      <div class="leg-item"><div class="leg-cor" style="background:var(--arthur);opacity:.65"></div> Arthur completo</div>
      <div class="leg-item"><div class="leg-cor" style="background:var(--alice);opacity:.65"></div> Alice completo</div>
      <div class="leg-item"><span>📝</span> Com observação</div>
    </div>
  </div>

  <!-- GRÁFICO -->
  <div class="section">
    <div class="section-title">📊 Adesão por dia</div>
    <div class="grafico-wrap">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div class="section">
    <div class="section-title">🗂️ Histórico</div>
    <button class="btn-limpar" onclick="limparHistorico()">🗑️ Limpar histórico</button>
    <div id="historico"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-titulo"></div>
    <textarea id="modal-txt" placeholder="Escreva uma observação…"></textarea>
    <div class="modal-btns">
      <button class="modal-btn del" id="modal-del" onclick="salvarObs(true)">🗑️</button>
      <button class="modal-btn cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-btn save" onclick="salvarObs(false)">Salvar</button>
    </div>
  </div>
</div>

<script>

const MEDS = [
  { nome: 'Ferro',      icon: '🫀' },
  { nome: 'Flixotide',  icon: '🫁' },
  { nome: 'Vitamina D', icon: '☀️' },
  { nome: 'Zinco',      icon: '⚡' },
  { nome: 'Ômega 3',    icon: '🐟' },
];

const CRIANCAS = ['Arthur', 'Alice'];

// ─── Utils ────────────────────────────────────────────────
function hoje() { return new Date().toLocaleDateString('pt-BR'); }
function hojeISO() { return new Date().toISOString().split('T')[0]; }
function nomeMes(m) {
  return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
          'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][m];
}
function getHistorico() { return JSON.parse(localStorage.getItem('historico') || '[]'); }
function setHistorico(d) { localStorage.setItem('historico', JSON.stringify(d)); }

// ─── Render cartões ───────────────────────────────────────
function renderCards() {
  const dados = getHistorico();
  const dataHoje = hoje();

  CRIANCAS.forEach(nome => {
    const cls = nome.toLowerCase();
    const container = document.getElementById('meds-' + nome);
    container.innerHTML = '';

    let feitos = 0;

    MEDS.forEach(med => {
      const reg = dados.find(r => r.data === dataHoje && r.nome === nome && r.remedio === med.nome);
      const done = !!reg;
      if (done) feitos++;

      const item = document.createElement('div');
      item.className = 'med-item' + (done ? ` done-${cls}` : '');

      item.innerHTML = `
        <div class="med-nome">
          <span class="med-icon">${med.icon}</span>
          ${med.nome}
          ${done ? `<span class="med-hora">${reg.hora}</span>` : ''}
        </div>
        <button class="med-btn ${done ? `done-${cls}` : ''}" 
                onclick="marcar('${nome}','${med.nome}',this)">
          ${done ? '✓' : ''}
        </button>`;

      container.appendChild(item);
    });

    // barra de progresso
    document.getElementById('prog-' + nome).style.width = (feitos / MEDS.length * 100) + '%';
  });
}

// ─── Marcar ───────────────────────────────────────────────
function marcar(nome, remedio, btn) {
  let dados = getHistorico();
  const data = hoje();
  const key = `${data}_${nome}_${remedio}`;

  if (localStorage.getItem(key)) {
    localStorage.removeItem(key);
    dados = dados.filter(r => !(r.data === data && r.nome === nome && r.remedio === remedio));
    setHistorico(dados);
    atualizarTudo();
    return;
  }

  const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  localStorage.setItem(key, hora);

  if (!dados.some(r => r.data === data && r.nome === nome && r.remedio === remedio)) {
    dados.push({ data, dataISO: hojeISO(), nome, remedio, hora });
    setHistorico(dados);
  }
  atualizarTudo();
}

// ─── Alerta ───────────────────────────────────────────────
function verificarPendencias() {
  const dados = getHistorico();
  const faltando = [];
  CRIANCAS.forEach(n => {
    MEDS.forEach(m => {
      if (!dados.some(r => r.data === hoje() && r.nome === n && r.remedio === m.nome)) {
        faltando.push(`${n}: ${m.nome}`);
      }
    });
  });

  const div = document.getElementById('alerta');
  if (faltando.length === 0) {
    div.className = 'alerta-ok';
    div.innerHTML = '✅ Tudo administrado hoje! Ótimo trabalho.';
  } else {
    div.className = 'alerta-warn';
    div.innerHTML = '⚠️ Faltando hoje: ' + faltando.join(' · ');
  }
}

// ─── Calendário ──────────────────────────────────────────
function gerarCalendario() {
  const dados = getHistorico();
  const mapa = {};
  dados.forEach(r => {
    if (!mapa[r.data]) mapa[r.data] = { Arthur: 0, Alice: 0 };
    mapa[r.data][r.nome]++;
  });

  const now = new Date();
  const ano = now.getFullYear();
  const mes = now.getMonth();

  document.getElementById('titulo-mes').textContent = nomeMes(mes) + ' ' + ano;

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes + 1, 0).getDate();
  const hojeNum = now.getDate();

  const grid = document.getElementById('calendario');
  grid.innerHTML = '';

  for (let i = 0; i < primeiroDia; i++) {
    const vazio = document.createElement('div');
    grid.appendChild(vazio);
  }

  for (let d = 1; d <= diasNoMes; d++) {
    const df = String(d).padStart(2,'0') + '/' + String(mes+1).padStart(2,'0') + '/' + ano;
    const info = mapa[df] || { Arthur: 0, Alice: 0 };
    const aOk = info.Arthur === MEDS.length;
    const lOk = info.Alice  === MEDS.length;

    const cell = document.createElement('div');
    cell.className = 'cal-day' + (d === hojeNum ? ' hoje' : '');
    cell.onclick = () => abrirObs(df);

    if (aOk && lOk) {
      cell.innerHTML = `<div class="split-bg"><div class="lado azul"></div><div class="lado rosa"></div></div>`;
    } else if (aOk) {
      cell.classList.add('full-arthur');
      cell.innerHTML = `<div class="full-bg"></div>`;
    } else if (lOk) {
      cell.classList.add('full-alice');
      cell.innerHTML = `<div class="full-bg"></div>`;
    }

    const obs = localStorage.getItem('obs_' + df);
    cell.innerHTML += `<span class="num">${d}</span>${obs ? '<div class="obs-dot">📝</div>' : ''}`;
    grid.appendChild(cell);
  }
}

// ─── Obs Modal ────────────────────────────────────────────
let _obsData = null;
function abrirObs(data) {
  _obsData = data;
  document.getElementById('modal-titulo').textContent = '📝 Observação — ' + data;
  document.getElementById('modal-txt').value = localStorage.getItem('obs_' + data) || '';
  document.getElementById('modal').classList.add('open');
}
function fecharModal() {
  document.getElementById('modal').classList.remove('open');
  _obsData = null;
}
function salvarObs(apagar) {
  if (!_obsData) return;
  if (apagar) {
    localStorage.removeItem('obs_' + _obsData);
  } else {
    const v = document.getElementById('modal-txt').value.trim();
    if (v) localStorage.setItem('obs_' + _obsData, v);
    else localStorage.removeItem('obs_' + _obsData);
  }
  fecharModal();
  gerarCalendario();
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharModal();
});

// ─── Histórico ────────────────────────────────────────────
function mostrarHistorico() {
  const dados = getHistorico();
  const agrupado = {};
  dados.forEach(r => {
    if (!agrupado[r.data]) agrupado[r.data] = [];
    agrupado[r.data].push(r);
  });

  const div = document.getElementById('historico');
  const datas = Object.keys(agrupado).sort((a,b) => {
    const parse = s => { const p = s.split('/'); return new Date(p[2],p[1]-1,p[0]); };
    return parse(b) - parse(a);
  });

  if (datas.length === 0) {
    div.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;">Nenhum registro ainda.</p>';
    return;
  }

  div.innerHTML = datas.map(d => {
    const items = agrupado[d];
    const pills = items.map(r => {
      const icon = MEDS.find(m => m.nome === r.remedio)?.icon || '💊';
      return `<span class="hist-pill ${r.nome.toLowerCase()}">${icon} ${r.remedio}</span>`;
    }).join('');
    return `<div class="hist-dia">
      <div class="hist-data">📅 ${d}</div>
      <div class="hist-items">${pills}</div>
    </div>`;
  }).join('');
}

function limparHistorico() {
  if (!confirm('Limpar todo o histórico?')) return;
  localStorage.removeItem('historico');
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('obs_') || k.match(/^\d{2}\/\d{2}\/\d{4}_/)) localStorage.removeItem(k);
  });
  atualizarTudo();
}

// ─── Gráfico ─────────────────────────────────────────────
let chartInstance = null;
function atualizarGrafico() {
  const dados = getHistorico();
  if (!dados.length) return;

  const diasA = {}, diasL = {};
  dados.forEach(r => {
    if (r.nome === 'Arthur') { diasA[r.data] = (diasA[r.data] || 0) + 1; }
    else                     { diasL[r.data] = (diasL[r.data] || 0) + 1; }
  });

  const todasDatas = [...new Set([...Object.keys(diasA), ...Object.keys(diasL)])].sort((a,b) => {
    const p = s => { const x = s.split('/'); return new Date(x[2],x[1]-1,x[0]); };
    return p(a) - p(b);
  }).slice(-14);

  const labels = todasDatas.map(d => d.substring(0,5));
  const pctA = todasDatas.map(d => Math.round(((diasA[d] || 0) / MEDS.length) * 100));
  const pctL = todasDatas.map(d => Math.round(((diasL[d] || 0) / MEDS.length) * 100));

  const ctx = document.getElementById('grafico').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Arthur', data: pctA, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 6, borderSkipped: false },
        { label: 'Alice',  data: pctL, backgroundColor: 'rgba(236,72,153,0.7)', borderRadius: 6, borderSkipped: false },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { font: { family: 'DM Sans', size: 12 }, color: '#1E1B4B' } }
      },
      scales: {
        y: { beginAtZero: true, max: 100,
          ticks: { callback: v => v + '%', font: { family: 'DM Sans' }, color: '#6B7280' },
          grid: { color: '#F3F4F6' }
        },
        x: { ticks: { font: { family: 'DM Sans', size: 11 }, color: '#6B7280' }, grid: { display: false } }
      }
    }
  });
}

// ─── Data header ─────────────────────────────────────────
function atualizarDataHoje() {
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('data-hoje').textContent =
    new Date().toLocaleDateString('pt-BR', opts);
}

// ─── Tudo ─────────────────────────────────────────────────
function atualizarTudo() {
  renderCards();
  verificarPendencias();
  mostrarHistorico();
  atualizarGrafico();
  gerarCalendario();
}

atualizarDataHoje();
atualizarTudo();

</script>
